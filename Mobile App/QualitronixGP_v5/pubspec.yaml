name: QualitronixGP_v5
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.0
  shared_preferences: ^2.2.2
  image_picker: ^0.8.6+3
  http: ^1.2.2
  firebase_core: ^2.13.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.5.0
  firebase_storage: ^11.3.0
  path_provider: ^2.1.4
  photo_view: ^0.14.0
  cupertino_icons: ^1.0.6
  lucide_icons: ^0.257.0
  introduction_screen: ^3.1.12
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  cloudinary_public: ^0.23.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lang/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/512.png"
  adaptive_icon_foreground: "assets/images/512.png"